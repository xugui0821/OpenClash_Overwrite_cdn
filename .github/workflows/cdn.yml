name: 自动同步上游并替换 CDN 链接

on:
  schedule:
    # 定时任务：每天 UTC 0点和12点（北京时间 8:00 和 20:00）自动运行
    # 你可以根据需要调整频率，例如 '0 * * * *' 代表每小时运行一次
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许在 Actions 页面手动点击触发，方便测试

jobs:
  sync-and-replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 GITHUB_TOKEN 写入代码库的权限

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须设置为 0，获取完整历史记录才能进行合并

      - name: 配置 Git 用户
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 同步上游更新 (Sync from Upstream)
        run: |
          # ==========================================
          # ⚠️ 请将下方的 URL 替换为你 Fork 的真正的上游仓库地址！
          # 例如：https://github.com/Giveupmoon/OpenClash_Overwrite.git
          # ==========================================
          UPSTREAM_REPO="https://github.com/Giveupmoon/OpenClash_Overwrite.git"
          UPSTREAM_BRANCH="main" # 如果上游默认分支叫 master，请改为 master

          # 添加上游仓库为远程节点
          git remote add upstream $UPSTREAM_REPO
          git fetch upstream

          # 合并上游分支。
          # 使用 -X theirs 策略：如果上游的代码和我们的替换代码发生冲突，优先采用上游的最新代码。
          # 因为下一步我们马上会重新运行替换脚本，所以不用担心旧链接覆盖我们的新链接。
          git merge -X theirs upstream/$UPSTREAM_BRANCH -m "Merge upstream updates" --allow-unrelated-histories || echo "代码已是最新的或无需要合并的内容"

      - name: 批量替换文件中的链接 (Replace URLs)
        run: |
          # 查找文件并执行多重替换
          find . -type f -not -path "*/\.git/*" -not -path "*/\.github/*" -exec sed -i \
          -e 's|https://raw.githubusercontent.com/Giveupmoon/OpenClash_Overwrite/refs/heads/main|https://testingcf.jsdelivr.net/gh/xugui0821/OpenClash_Overwrite_cdn@main|g' \
          -e 's|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta|https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta|g' \
          -e 's|https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/refs/heads/main|https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main|g' \
          -e 's|https://raw.githubusercontent.com/Aethersailor/Custom_OpenClash_Rules/main|https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main|g' \
          -e 's|https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main|https://testingcf.jsdelivr.net/gh/Vbaethon/HOMOMIX@main|g' \
          {} +

      - name: 提交并推送更改 (Commit & Push)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 同步上游更新并替换为 jsDelivr CDN 链接"
          file_pattern: '.'
